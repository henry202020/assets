<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Forge | Modo Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">

    <div id="loginOverlay" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-slate-800 p-8 rounded-2xl border border-white/10 w-96 text-center">
            <h2 class="text-2xl font-bold mb-6">Acesso Master</h2>
            <input type="password" id="pass" placeholder="Senha Admin" class="w-full bg-black/20 p-3 rounded mb-4 outline-none border border-white/5 focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded font-bold">Desbloquear</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black">MODO EDITOR <span class="text-blue-500">PRO</span></h1>
            <button onclick="logout()" class="text-sm opacity-50 hover:opacity-100">Sair do Painel</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-slate-800 p-6 rounded-2xl space-y-6">
                <h3 class="text-lg font-bold border-b border-white/5 pb-2 text-blue-400">Personalizar Asset</h3>
                
                <div>
                    <label class="block text-sm mb-2">Título do Asset:</label>
                    <input type="text" id="editTitle" class="w-full bg-black/40 p-3 rounded">
                </div>

                <div>
                    <label class="block text-sm mb-2">URL da Imagem (Capa):</label>
                    <input type="text" id="editImg" placeholder="https://..." class="w-full bg-black/40 p-3 rounded">
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl space-y-6">
                <h3 class="text-lg font-bold border-b border-white/5 pb-2 text-red-400">Comportamento de Falha</h3>
                
                <div>
                    <label class="block text-sm mb-2">Tipo de Erro no Download:</label>
                    <select id="editFail" class="w-full bg-black/40 p-3 rounded text-white">
                        <option value="none">Nenhum (Download Livre)</option>
                        <option value="404">Erro 404 - Servidor Caído</option>
                        <option value="limit">Limite de Banda Excedido</option>
                        <option value="virus">Falso Positivo de Vírus</option>
                        <option value="login">Requer Conta Premium</option>
                    </select>
                </div>

                <button onclick="saveAll()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-black text-lg transition-transform active:scale-95">
                    SALVAR ALTERAÇÕES NO SITE
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
