<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | AssetForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="notification-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <div id="loginOverlay" class="fixed inset-0 bg-[#0b0e14] flex items-center justify-center z-50">
        <div class="bg-slate-900 p-10 rounded-3xl border border-white/5 w-[400px] text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-6 italic">MASTER ACCESS</h2>
            <input type="password" id="pass" placeholder="SENHA" class="w-full bg-black/40 p-5 rounded-2xl mb-6 border border-white/5 outline-none focus:border-blue-500 text-center tracking-[10px]">
            <div class="flex flex-col gap-3">
                <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-2xl font-black hover:bg-blue-500 transition">ENTRAR</button>
                <button onclick="location.href='index.html'" class="w-full bg-white/5 py-3 rounded-2xl font-bold hover:bg-white/10 transition">VOLTAR AO SITE</button>
            </div>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8 bg-slate-900 p-6 rounded-3xl border border-white/5">
            <h1 id="panelTitle" class="text-2xl font-black">CRIAR NOVO</h1>
            <div class="flex gap-3">
                <button onclick="switchTab('create')" id="tabCreate" class="px-6 py-3 rounded-xl font-bold bg-blue-600">Criar</button>
                <button onclick="switchTab('manage')" id="tabManage" class="px-6 py-3 rounded-xl font-bold bg-slate-800">Gerenciar</button>
                <button onclick="location.href='index.html'" class="px-4 py-3 rounded-xl bg-red-500/10 text-red-500">Sair</button>
            </div>
        </div>

        <div id="sectionForm" class="grid grid-cols-1 md:grid-cols-2 gap-8 animate__animated animate__fadeIn">
            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                <input type="hidden" id="editId">
                <label class="block font-bold text-blue-400">Título</label>
                <input type="text" id="assetTitle" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none">
                
                <label class="block font-bold text-blue-400">Descrição Detalhada</label>
                <textarea id="assetDesc" rows="4" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none resize-none" placeholder="Conte mais sobre o asset..."></textarea>

                <label class="block font-bold text-blue-400">Link do Download</label>
                <input type="text" id="assetFileUrl" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none">
            </div>

            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold text-blue-400">Status</label>
                        <select id="assetStatus" class="w-full bg-black/50 p-4 rounded-xl border border-white/5">
                            <option value="nenhum">Nenhum</option>
                            <option value="novo">Novo</option>
                            <option value="limitado">Limitado</option>
                            <option value="recomendado">Recomendado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-bold text-red-400">Falha</label>
                        <select id="assetFail" class="w-full bg-black/50 p-4 rounded-xl border border-white/5">
                            <option value="none">Nenhuma</option>
                            <option value="404">Erro 404</option>
                            <option value="virus">Vírus</option>
                            <option value="limit">Limite</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block font-bold text-blue-400 mb-2">Capa (Upload)</label>
                    <input type="file" id="assetImg" accept="image/*" class="w-full text-sm text-slate-500 file:bg-blue-600 file:text-white file:rounded-full file:border-0 file:px-4 file:py-2">
                </div>
                <button id="mainBtn" onclick="saveAsset()" class="w-full bg-green-600 py-6 rounded-2xl font-black text-xl hover:bg-green-500 transition shadow-lg active:scale-95">SALVAR ASSET</button>
            </div>
        </div>

        <div id="sectionManage" class="hidden animate__animated animate__fadeIn space-y-4">
            <div id="existingAssetsList" class="grid gap-3"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
