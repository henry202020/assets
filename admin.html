<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | AssetForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="notification-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <div id="loginOverlay" class="fixed inset-0 bg-[#0b0e14] flex items-center justify-center z-50">
        <div class="bg-slate-900 p-10 rounded-3xl border border-white/5 w-[400px] text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-6">Acesso Master</h2>
            <input type="password" id="pass" placeholder="Senha" class="w-full bg-black/40 p-5 rounded-2xl mb-4 border border-white/5 outline-none focus:border-blue-500 text-center tracking-[5px]">
            <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-2xl font-black hover:bg-blue-500 transition">ENTRAR</button>
            <button onclick="location.href='index.html'" class="mt-4 text-slate-500 text-sm">Voltar</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10 bg-slate-900/50 p-6 rounded-3xl border border-white/5">
            <h1 id="panelTitle" class="text-2xl font-black italic">NOVO ASSET</h1>
            <div class="flex gap-2">
                <button onclick="switchTab('create')" id="tabCreate" class="px-6 py-3 rounded-xl font-bold bg-blue-600">Criar</button>
                <button onclick="switchTab('manage')" id="tabManage" class="px-6 py-3 rounded-xl font-bold bg-slate-800">Meus Assets</button>
                <button onclick="location.href='index.html'" class="px-4 py-3 rounded-xl bg-red-600/10 text-red-500">Sair</button>
            </div>
        </div>

        <div id="sectionForm" class="animate__animated animate__fadeIn">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                    <input type="hidden" id="editId">
                    <label class="block text-blue-400 font-bold">Título</label>
                    <input type="text" id="assetTitle" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-blue-400 font-bold">Status</label>
                            <select id="assetStatus" class="w-full bg-black/50 p-4 rounded-xl border border-white/5">
                                <option value="nenhum">Nenhum</option>
                                <option value="novo">Novo</option>
                                <option value="limitado">Limitado</option>
                                <option value="recomendado">Recomendado</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-red-400 font-bold">Falha</label>
                            <select id="assetFail" class="w-full bg-black/50 p-4 rounded-xl border border-white/5">
                                <option value="none">Nenhuma</option>
                                <option value="404">Erro 404</option>
                                <option value="virus">Vírus</option>
                                <option value="limit">Limite</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                    <label class="block text-blue-400 font-bold">Arquivos (Capa e Download)</label>
                    <input type="file" id="assetImg" accept="image/*" class="w-full text-sm">
                    <input type="file" id="assetFile" class="w-full text-sm">
                    <button id="mainBtn" onclick="saveAsset()" class="w-full bg-green-600 py-6 rounded-2xl font-black text-xl mt-4">SALVAR ASSET</button>
                    <button id="cancelBtn" onclick="resetForm()" class="hidden w-full text-slate-500">Cancelar Edição</button>
                </div>
            </div>
        </div>

        <div id="sectionManage" class="hidden animate__animated animate__fadeIn">
            <div id="existingAssetsList" class="grid gap-4"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
