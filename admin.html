<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | AssetForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="notification-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

    <div id="deleteModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-6">Delete permanently?</h3>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 rounded-xl bg-slate-800 font-bold">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 py-3 rounded-xl bg-red-600 font-bold">Delete</button>
            </div>
        </div>
    </div>

    <div id="loginOverlay" class="fixed inset-0 bg-[#0b0e14] flex items-center justify-center z-50">
        <div class="bg-slate-900 p-10 rounded-3xl border border-white/5 w-[400px] text-center shadow-2xl">
            <h2 class="text-3xl font-black mb-6 italic text-blue-500 font-mono">ADMIN</h2>
            <input type="password" id="pass" placeholder="PASSWORD" class="w-full bg-black/40 p-5 rounded-2xl mb-6 border border-white/5 outline-none focus:border-blue-500 text-center tracking-[10px]">
            <div class="flex flex-col gap-3">
                <button onclick="login()" class="w-full bg-blue-600 py-5 rounded-2xl font-black hover:bg-blue-500 transition shadow-lg shadow-blue-900/30 uppercase">Login</button>
                <button onclick="location.href='index.html'" class="text-slate-500 hover:text-white text-sm">Back to Home</button>
            </div>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto p-8">
        <div class="flex flex-wrap justify-between items-center gap-4 mb-8 bg-slate-900/50 p-6 rounded-3xl border border-white/5">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <h1 id="panelTitle" class="text-xl font-black uppercase tracking-widest">Editor Mode</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="switchTab('create')" id="tabCreate" class="px-6 py-3 rounded-xl font-bold bg-blue-600 transition">New</button>
                <button onclick="switchTab('manage')" id="tabManage" class="px-6 py-3 rounded-xl font-bold bg-slate-800 transition">List</button>
                <button onclick="location.reload()" class="px-6 py-3 rounded-xl font-bold bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white transition uppercase text-xs">Exit Panel</button>
            </div>
        </div>

        <div id="sectionForm" class="grid grid-cols-1 md:grid-cols-2 gap-8 animate__animated animate__fadeIn">
            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                <input type="hidden" id="editId">
                <label class="block font-bold text-blue-400 text-xs uppercase">Product Title</label>
                <input type="text" id="assetTitle" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none focus:border-blue-500">
                
                <label class="block font-bold text-blue-400 text-xs uppercase">Description</label>
                <textarea id="assetDesc" rows="5" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none resize-none focus:border-blue-500"></textarea>
            </div>

            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 flex flex-col justify-between space-y-6">
                <div class="space-y-4">
                    <label class="block font-bold text-blue-400 text-xs uppercase">Download Link</label>
                    <input type="text" id="assetFileUrl" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none focus:border-blue-500" placeholder="https://mediafire.com/...">

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold text-xs uppercase">Status</label>
                            <select id="assetStatus" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none">
                                <option value="nenhum">None</option>
                                <option value="novo">New</option>
                                <option value="limitado">Limited</option>
                                <option value="recomendado">Recommended</option>
                            </select>
                        </div>
                        <div>
                            <label class="block font-bold text-red-500 text-xs uppercase">Simulate Failure</label>
                            <select id="assetFail" class="w-full bg-black/50 p-4 rounded-xl border border-white/5 outline-none">
                                <option value="none">None</option>
                                <option value="404">404 Error</option>
                                <option value="virus">Virus Alert</option>
                                <option value="limit">Rate Limit</option>
                            </select>
                        </div>
                    </div>

                    <label class="block font-bold text-blue-400 text-xs uppercase">Cover Image</label>
                    <input type="file" id="assetImg" accept="image/*" class="w-full text-sm text-slate-500 file:bg-blue-600 file:text-white file:rounded-lg file:border-0 file:px-4 file:py-2 cursor-pointer">
                </div>
                
                <button onclick="saveAsset()" id="mainBtn" class="w-full bg-green-600 py-6 rounded-2xl font-black text-xl hover:bg-green-500 transition shadow-lg active:scale-95">SAVE CHANGES</button>
            </div>
        </div>

        <div id="sectionManage" class="hidden animate__animated animate__fadeIn">
            <div id="existingAssetsList" class="grid gap-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
