<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetForge | Game Assets Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .asset-card { transition: all 0.3s ease; }
        .asset-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#0b0e14] text-white min-h-screen">

    <nav class="flex justify-between items-center px-10 py-6 border-b border-white/5 bg-[#0b0e14] sticky top-0 z-40">
        <div class="text-2xl font-black tracking-tighter text-blue-500 cursor-pointer" onclick="window.location.reload()">ASSET<span class="text-white">FORGE</span></div>
        <a href="admin.html" class="bg-blue-600/10 text-blue-400 px-4 py-2 rounded-lg hover:bg-blue-600 hover:text-white transition">Painel Admin</a>
    </nav>

    <header class="container mx-auto px-6 py-12 text-center">
        <h1 class="text-5xl font-bold mb-4 animate__animated animate__zoomIn">Biblioteca de Assets</h1>
        <p class="text-gray-400">Gerencie e baixe seus recursos de desenvolvimento.</p>
    </header>

    <main class="container mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="assetGrid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
