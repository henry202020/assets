<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetForge | Game Assets Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0e14] text-white">

    <nav class="flex justify-between items-center px-10 py-6 border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter text-blue-500">ASSET<span class="text-white">FORGE</span></div>
        <div class="flex gap-8 items-center">
            <a href="#" class="hover:text-blue-400 transition">Biblioteca</a>
            <a href="admin.html" class="bg-white/5 px-4 py-2 rounded-lg hover:bg-white/10 transition">Painel Admin</a>
        </div>
    </nav>

    <header class="container mx-auto px-6 py-16 text-center">
        <h1 class="text-6xl font-bold mb-4 animate__animated animate__fadeIn">Turbine seu Jogo</h1>
        <p class="text-gray-400 text-xl mb-10">Assets premium, modelos 3D e scripts prontos para Unreal e Unity.</p>
    </header>

    <main class="container mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="assetGrid">
            <div class="bg-[#161b22] border border-white/10 rounded-2xl overflow-hidden hover:border-blue-500 transition-all group">
                <div class="h-48 bg-cover bg-center transition-transform group-hover:scale-105" id="assetImage" style="background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=500')"></div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold" id="assetTitle">Cyber City Pack 3D</h3>
                        <button class="text-gray-500 hover:text-red-500 transition">❤</button>
                    </div>
                    <p class="text-gray-400 text-sm mb-6">Modelos modulares para cidades futuristas de alta fidelidade.</p>
                    
                    <button id="btnMainDownload" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95">
                        <span>Baixar Asset</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    </button>
                    <div id="statusMsg" class="mt-3 text-center text-xs font-mono min-h-[20px]"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
