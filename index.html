<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editor Pro | AssetForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="bg-slate-900 p-8 rounded-2xl border border-white/10 w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Acesso Master</h2>
            <input type="password" id="pass" placeholder="Senha Admin" class="w-full bg-slate-800 p-4 rounded-xl mb-4 outline-none border border-transparent focus:border-blue-500 transition">
            <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 transition">Entrar</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900 p-6 rounded-2xl border border-white/5">
            <div>
                <h1 class="text-2xl font-black italic">MODO EDITOR</h1>
                <p class="text-xs text-slate-500">Gerenciamento de Assets & Falhas</p>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">Sair para o Site</button>
        </header>

        <div class="flex gap-4 mb-8">
            <button onclick="switchTab('create')" id="tabCreate" class="px-6 py-3 rounded-xl font-bold bg-blue-600">Criar Novo Asset</button>
            <button onclick="switchTab('manage')" id="tabManage" class="px-6 py-3 rounded-xl font-bold bg-slate-800">Configurações & Existentes</button>
        </div>

        <div id="sectionCreate" class="grid grid-cols-1 md:grid-cols-2 gap-8 animate__animated animate__fadeIn">
            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                <h3 class="text-xl font-bold mb-4 text-blue-400">Informações do Arquivo</h3>
                <input type="text" id="newTitle" placeholder="Nome do Asset (ex: Pack Espadas 3D)" class="w-full bg-black/40 p-4 rounded-xl outline-none focus:ring-2 ring-blue-500">
                
                <div class="p-4 border-2 border-dashed border-slate-700 rounded-xl">
                    <label class="block text-sm mb-2 text-slate-400">Capa do Asset (Imagem):</label>
                    <input type="file" id="newImg" accept="image/*" class="text-sm">
                </div>

                <div class="p-4 border-2 border-dashed border-slate-700 rounded-xl">
                    <label class="block text-sm mb-2 text-slate-400">Arquivo para Download (.zip, .rar, .txt):</label>
                    <input type="file" id="newFile" class="text-sm">
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                <h3 class="text-xl font-bold mb-4 text-red-400">Simulação de Falha</h3>
                <select id="newFail" class="w-full bg-black/40 p-4 rounded-xl outline-none">
                    <option value="none">Nenhuma (Funciona normal)</option>
                    <option value="404">Erro 404 (Indisponível)</option>
                    <option value="virus">Alerta de Vírus</option>
                    <option value="limit">Limite de Download</option>
                </select>
                <button onclick="saveAsset()" class="w-full bg-green-600 py-5 rounded-2xl font-black text-xl shadow-lg shadow-green-900/20 hover:scale-[1.02] transition">SALVAR ASSET</button>
            </div>
        </div>

        <div id="sectionManage" class="hidden animate__animated animate__fadeIn">
            <div class="bg-slate-900 p-8 rounded-3xl border border-white/5">
                <h3 class="text-xl font-bold mb-6">Arquivos no Banco de Dados</h3>
                <div id="existingAssetsList" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
